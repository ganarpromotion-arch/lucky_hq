<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍀 Lucky HQ — AI 운영본부</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  /* ==== 메인 콘솔 전용 ==== */
  .app {
    display: grid;
    grid-template-rows: 56px 1fr;
    grid-template-columns: 280px 1fr 320px;
    grid-template-areas:
      "topbar topbar topbar"
      "left   center right";
    height: 100vh;
    gap: 1px;
    background: var(--border);
  }

  .topbar {
    grid-area: topbar;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border-strong);
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-pixel);
    font-size: 16px;
    color: var(--clover-gold);
  }
  .brand .clover { font-size: 22px; filter: drop-shadow(0 0 6px rgba(74,222,128,0.5)); }
  .topbar .meta { display: flex; align-items: center; gap: 18px; font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); }
  .topbar .meta .clock { color: var(--crt-amber); }

  /* === 좌측: 직원 패널 === */
  .panel-left { grid-area: left; background: var(--bg-surface); overflow-y: auto; }
  .panel-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-head .title { font-family: var(--font-pixel); font-size: 12px; color: var(--text-muted); letter-spacing: 0.05em; }
  .panel-head .count { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }

  .agent-list { display: flex; flex-direction: column; }
  .agent-row {
    display: grid;
    grid-template-columns: 32px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.08s ease;
  }
  .agent-row:hover { background: var(--bg-raised); }
  .agent-row.has-dept { border-left: 2px solid var(--clover-gold); }
  .agent-row .av {
    width: 28px; height: 28px;
    display: grid; place-items: center;
    background: var(--bg-deep);
    border: 1px solid var(--border-strong);
    border-radius: 2px;
    font-size: 16px;
  }
  .agent-row .info { min-width: 0; }
  .agent-row .name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent-row .status { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .agent-row .status.run { color: var(--crt-amber); }

  /* === 중앙: 픽셀 오피스 === */
  .panel-center {
    grid-area: center;
    background:
      repeating-linear-gradient(0deg, transparent 0px, transparent 23px, rgba(255,255,255,0.02) 23px, rgba(255,255,255,0.02) 24px),
      repeating-linear-gradient(90deg, transparent 0px, transparent 23px, rgba(255,255,255,0.02) 23px, rgba(255,255,255,0.02) 24px),
      var(--bg-deep);
    overflow: auto;
    padding: 28px;
    position: relative;
  }
  .office-title {
    font-family: var(--font-pixel);
    font-size: 13px;
    color: var(--clover-gold);
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 0.08em;
  }
  .office-title small {
    display: block;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0;
  }

  .office {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    max-width: 720px;
    margin: 0 auto;
  }

  .desk {
    aspect-ratio: 1 / 1;
    background: var(--bg-surface);
    border: 1px solid var(--border-strong);
    box-shadow: 3px 3px 0 0 var(--border);
    border-radius: 2px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 6px;
    cursor: pointer;
    position: relative;
    transition: transform 0.06s, box-shadow 0.06s;
  }
  .desk:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 0 var(--border-strong);
    border-color: var(--clover-gold);
  }
  .desk:active {
    transform: translate(2px, 2px);
    box-shadow: 0 0 0 0 var(--border);
  }
  .desk .av { font-size: 32px; line-height: 1; }
  .desk .role {
    font-family: var(--font-pixel);
    font-size: 10px;
    color: var(--text);
    text-align: center;
    letter-spacing: 0.04em;
  }
  .desk .stat {
    position: absolute;
    top: 6px; right: 6px;
    font-family: var(--font-pixel);
    font-size: 8px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }
  .desk.has-dept::after {
    content: "부서";
    position: absolute;
    bottom: 6px; left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-pixel);
    font-size: 8px;
    color: var(--clover-gold);
    letter-spacing: 0.08em;
    border: 1px solid var(--clover-gold);
    padding: 1px 4px;
    border-radius: 1px;
    background: rgba(224,184,74,0.08);
  }
  .desk.is-busy { animation: deskBusy 0.9s steps(2) infinite; }
  @keyframes deskBusy {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-2px); }
  }
  .desk.is-busy .stat { color: var(--crt-amber); }
  .desk.is-busy .av { filter: drop-shadow(0 0 5px rgba(255,180,84,0.5)); }

  /* === 우측: 실시간 로그 === */
  .panel-right { grid-area: right; background: var(--bg-surface); display: flex; flex-direction: column; }
  .log-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.7;
  }
  .log-row {
    display: grid;
    grid-template-columns: 56px 64px 1fr;
    gap: 8px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }
  .log-row .t { color: var(--text-dim); }
  .log-row .a { color: var(--clover-gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-row .m { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-empty { color: var(--text-dim); padding: 16px; text-align: center; font-family: var(--font-mono); font-size: 11px; }

  /* 모바일/좁은 화면 — 1열 스택 */
  @media (max-width: 960px) {
    .app {
      grid-template-columns: 1fr;
      grid-template-rows: 56px auto auto auto;
      grid-template-areas:
        "topbar"
        "center"
        "left"
        "right";
      height: auto;
    }
    .panel-left, .panel-right { max-height: 360px; }
    .office { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand">
      <span class="clover">🍀</span>
      <span>Lucky HQ — AI 운영본부</span>
    </div>
    <div class="meta">
      <span>v1.0.0</span>
      <span id="health-ind">● 연결 확인 중</span>
      <span class="clock" id="clock">--:--:--</span>
    </div>
  </header>

  <!-- LEFT: 직원 명단 -->
  <aside class="panel-left">
    <div class="panel-head">
      <span class="title">직원 · 하는 일</span>
      <span class="count" id="agent-count">--</span>
    </div>
    <div class="agent-list" id="agent-list">
      <div class="log-empty">불러오는 중…</div>
    </div>
  </aside>

  <!-- CENTER: 픽셀 오피스 -->
  <main class="panel-center">
    <div class="office-title">
      ◆ LUCKY HQ FLOOR ◆
      <small>직원을 클릭하면 부서 작업창으로 이동합니다</small>
    </div>
    <div class="office" id="office"></div>
  </main>

  <!-- RIGHT: 실시간 로그 -->
  <aside class="panel-right">
    <div class="panel-head">
      <span class="title">실시간 로그</span>
      <span class="count" id="log-count">--</span>
    </div>
    <div class="log-list" id="log-list">
      <div class="log-empty">대기 중…</div>
    </div>
  </aside>

</div>
<script src="/static/console.js"></script>
</body>
</html>
